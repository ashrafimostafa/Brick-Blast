name: Release

# Builds a signed release APK and publishes it to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed. Can also be run manually.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # GitHub runners cannot reach the Myket mirror (Iran-only). Swap the Gradle
      # distribution and Maven repos to the official sources for CI builds only;
      # the committed files keep Myket as the local default.
      - name: Use official Gradle and Maven sources for CI
        run: |
          sed -i 's#maven.myket.ir/gradle/distributions#services.gradle.org/distributions#' \
            gradle/wrapper/gradle-wrapper.properties
          sed -i '/maven.myket.ir/d' settings.gradle.kts

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "artifacts/BrickBlast-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: artifacts/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
