# F-Droid build recipe for Brick Blast.
# Submit this file to the fdroiddata repository
# (https://gitlab.com/fdroid/fdroiddata) as
# metadata/com.mostafa.brickblast.yml
#
# A signed git tag "v1.1.1" must exist in the repo for the build below.

Categories:
  - Games
License: MIT
AuthorName: Mostafa Ashrafi
AuthorEmail: ashrafimostafa@gmail.com
SourceCode: https://github.com/ashrafimostafa/Brick-Blast
IssueTracker: https://github.com/ashrafimostafa/Brick-Blast/issues

AutoName: Brick Blast

RepoType: git
Repo: https://github.com/ashrafimostafa/Brick-Blast.git

Builds:
  - versionName: 1.1.1
    versionCode: 4
    commit: v1.1.1
    subdir: app
    # The project ships two flavors: "fdroid" (FOSS, no ads, no network) and
    # "store" (Tapsell ads). F-Droid must build the "fdroid" flavor only.
    gradle:
      - fdroid
    # The project uses the Myket maven mirror first (for builds inside Iran).
    # F-Droid's build servers cannot reach it, so strip it from settings.gradle.kts
    # (google()/mavenCentral() remain) and point the Gradle wrapper at the
    # official distribution.
    prebuild: sed -i -e '/maven.myket.ir/d' ../settings.gradle.kts && sed -i -e 's@maven.myket.ir/gradle/distributions@services.gradle.org/distributions@' ../gradle/wrapper/gradle-wrapper.properties

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: 1.1.1
CurrentVersionCode: 4
