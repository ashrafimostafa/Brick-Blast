# F-Droid build recipe for Brick Blast.
# This file is what you submit to the fdroiddata repository
# (https://gitlab.com/fdroid/fdroiddata) as
# metadata/com.mostafa.brickblast.yml
#
# Replace the GitHub/GitLab URLs below with your real repository before
# submitting. A signed git tag "v1.0.0" must exist for the build below.

Categories:
  - Games
License: MIT
AuthorName: Mostafa
SourceCode: https://github.com/ashrafimostafa/Brick-Blast
IssueTracker: https://github.com/ashrafimostafa/Brick-Blast/issues

AutoName: Brick Blast

RepoType: git
Repo: https://github.com/ashrafimostafa/Brick-Blast.git

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    subdir: app
    # The project uses the Myket maven mirror first (for builds inside Iran).
    # F-Droid's build servers cannot reach it, so strip it; google() and
    # mavenCentral() remain as the resolving repositories.
    prebuild: sed -i -e '/maven.myket.ir/d' ../settings.gradle.kts
    gradle:
      - fdroidRelease

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: 1.0.0
CurrentVersionCode: 1
